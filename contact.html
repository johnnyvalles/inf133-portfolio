<body>

  <header>
    <nav class="navbar fixed-top navbar-expand-lg navbar-light bg-light main-navbar">
      <div class="container">
        <a class="navbar-brand main-title" href="./index.html"><i class="fas fa-microchip mr-2"></i>Johnny Valles</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNavAltMarkup"
          aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
          <div class="navbar-nav ml-auto">
            <a class="nav-link active" href="./index.html">Home</a>
            <a class="nav-link active" href="./about.html">About</a>
            <a class="nav-link" href="./projects.html">Projects</a>
            <a class="nav-link" href="./contact.html">Contact</a>
          </div>
        </div>
      </div>
    </nav>
  </header>

  <main>
    <section class="jumbotron contact-jumbotron">
      <div class="container">
        <img src="./images/contact-animoji.png" alt="johnny's animoji" class="img-thumbnail animoji">
        <h1 class="display-4 text-center my-name">Let's get in touch!</h1>
      </div>
    </section>

    <section class="contact-container container mx-auto py-5 row">
      <form id="contact" name="contact" method="GET" class="mx-auto p-3">
        <div class="form-row">
          <div class="form-group col-md-6">
            <label for="firstName">First Name</label>
            <input id="firstName" class="form-control" type="text" name="firstName" placeholder="First Name" required>
          </div>
          <div class="form-group col-md-6">
            <label for="lastName">Last Name</label>
            <input id="lastName" class="form-control" type="text" name="lastName" placeholder="Last Name" required>
          </div>
          <div class="form-group col-md-12">
            <label for="inputEmail">Email</label>
            <input id="inputEmail" class="form-control" type="email" name="inputEmail" placeholder="Email" required>
          </div>
          <div class="form-group col-md-12">
            <label for="inputPhone">Phone (optional)</label>
            <input id="inputPhone" class="form-control" type="text" name="inputPhone" placeholder="Phone">
          </div>
          <div class="form-group col-md-12">
            <label for="message">Inquiry</label>
            <textarea id="message" class="form-control" name="message" rows="3" required></textarea>
          </div>
        </div>
        <button type="submit" class="btn btn-primary col-md-12">Contact Johnny</button>
      </form>
    </section>
  </main>

  <footer>
    <div class="container">
      <p>Johnny Valles &copy; 2020</p>
    </div>
  </footer>

  <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"

    crossorigin="anonymous"></script>
  <script></script>
